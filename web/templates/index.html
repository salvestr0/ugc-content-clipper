{% extends "base.html" %}
{% block title %}Dashboard — Viral Clipper{% endblock %}

{% block content %}
<div class="section">
    <div class="hero-input-wrap">
        <form hx-post="/api/jobs"
              hx-target="#job-list"
              hx-swap="afterbegin"
              hx-on::after-request="this.reset()">
            <input type="url"
                   name="url"
                   class="hero-input"
                   placeholder="Paste a YouTube URL to get started..."
                   autocomplete="off"
                   required>
            <button type="submit" class="btn btn-primary hero-submit">Process</button>
        </form>
    </div>

    <div class="section-header">
        <h2>Recent Jobs</h2>
    </div>

    <div class="card">
        <div id="job-list">
            {% for job in jobs %}
                {% include "_partials/job_card.html" %}
            {% else %}
            <div class="empty-state">
                No jobs yet
                <p>Paste a YouTube URL above to start clipping.</p>
            </div>
            {% endfor %}
        </div>
    </div>
</div>
{% endblock %}
