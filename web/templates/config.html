{% extends "base.html" %}
{% block title %}Config — Viral Clipper{% endblock %}

{% block content %}
<div class="section">
    <div class="mb-6">
        <h2>Configuration</h2>
        <p class="text-muted mt-2" style="font-size:.875rem;">Changes take effect on the next job run.</p>
    </div>

    <form hx-put="/api/config" hx-target="#config-status" hx-swap="innerHTML">
        <div class="card mb-4">
            <div class="card-header">
                <h3>Anthropic API</h3>
            </div>
            <div class="card-body">
                <div class="config-grid">
                    <div class="field">
                        <label>API Key</label>
                        <input type="password" name="anthropic.api_key"
                               value="{{ config.anthropic.api_key or '' }}"
                               placeholder="sk-ant-...">
                    </div>
                    <div class="field">
                        <label>Model</label>
                        <input type="text" name="anthropic.model"
                               value="{{ config.anthropic.model or 'claude-sonnet-4-6' }}"
                               placeholder="claude-sonnet-4-6">
                    </div>
                </div>
            </div>
        </div>

        <div class="card mb-4">
            <div class="card-header">
                <h3>Clips</h3>
            </div>
            <div class="card-body">
                <div class="config-grid">
                    <div class="field">
                        <label>Min Duration (s)</label>
                        <input type="number" name="clips.min_duration"
                               value="{{ config.clips.min_duration }}">
                    </div>
                    <div class="field">
                        <label>Max Duration (s)</label>
                        <input type="number" name="clips.max_duration"
                               value="{{ config.clips.max_duration }}">
                    </div>
                    <div class="field">
                        <label>Target Duration (s)</label>
                        <input type="number" name="clips.target_duration"
                               value="{{ config.clips.target_duration }}">
                    </div>
                    <div class="field">
                        <label>Clips Per Video</label>
                        <input type="number" name="clips.clips_per_video"
                               value="{{ config.clips.clips_per_video }}">
                    </div>
                </div>
            </div>
        </div>

        <div class="card mb-4">
            <div class="card-header">
                <h3>Output</h3>
            </div>
            <div class="card-body">
                <div class="config-grid">
                    <div class="field">
                        <label>Resolution</label>
                        <input type="text" name="output.resolution"
                               value="{{ config.output.resolution }}"
                               placeholder="1080x1920">
                    </div>
                    <div class="field">
                        <label>FPS</label>
                        <input type="number" name="output.fps"
                               value="{{ config.output.fps }}">
                    </div>
                    <div class="field">
                        <label>Video Bitrate</label>
                        <input type="text" name="output.video_bitrate"
                               value="{{ config.output.video_bitrate }}"
                               placeholder="4M">
                    </div>
                    <div class="field">
                        <label>Audio Bitrate</label>
                        <input type="text" name="output.audio_bitrate"
                               value="{{ config.output.audio_bitrate }}"
                               placeholder="192k">
                    </div>
                </div>
            </div>
        </div>

        <div class="card mb-4">
            <div class="card-header">
                <h3>Captions</h3>
            </div>
            <div class="card-body">
                <div class="field mb-4">
                    <label class="checkbox-label" style="margin-bottom:0;">
                        <input type="checkbox" name="captions.enabled" value="true"
                               {{ 'checked' if config.captions.enabled else '' }}>
                        Enable animated captions
                    </label>
                </div>
                <div class="config-grid">
                    <div class="field">
                        <label>Font</label>
                        <input type="text" name="captions.font"
                               value="{{ config.captions.font }}">
                    </div>
                    <div class="field">
                        <label>Font Size</label>
                        <input type="number" name="captions.font_size"
                               value="{{ config.captions.font_size }}">
                    </div>
                    <div class="field">
                        <label>Words Per Group</label>
                        <input type="number" name="captions.words_per_group"
                               value="{{ config.captions.words_per_group }}">
                    </div>
                </div>
            </div>
        </div>

        <div class="card mb-6">
            <div class="card-header">
                <h3>Scene Detection</h3>
            </div>
            <div class="card-body">
                <div class="config-grid">
                    <div class="field">
                        <label>Threshold</label>
                        <input type="number" step="0.1" name="scene_detection.threshold"
                               value="{{ config.scene_detection.threshold }}">
                    </div>
                    <div class="field">
                        <label>Min Scene Length (s)</label>
                        <input type="number" step="0.1" name="scene_detection.min_scene_length"
                               value="{{ config.scene_detection.min_scene_length }}">
                    </div>
                </div>
            </div>
        </div>

        <div class="flex items-center gap-4">
            <button type="submit" class="btn btn-primary">Save config</button>
            <div id="config-status"></div>
        </div>
    </form>
</div>
{% endblock %}
