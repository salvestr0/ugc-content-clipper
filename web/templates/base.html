<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Viral Clipper{% endblock %}</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/app.css">
    <script src="https://unpkg.com/htmx.org@2.0.4"></script>
    <script src="https://unpkg.com/htmx-ext-sse@2.2.2/sse.js"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
</head>
<body>
    <nav class="nav">
        <a href="/" class="nav-brand">
            <span class="nav-logo">▶</span>
            Viral Clipper
        </a>
        <ul class="nav-links">
            <li><a href="/" {% if request.url.path == "/" %}class="active"{% endif %}>Dashboard</a></li>
            <li><a href="/watchlist" {% if request.url.path == "/watchlist" %}class="active"{% endif %}>Watchlist</a></li>
            <li><a href="/config" {% if request.url.path == "/config" %}class="active"{% endif %}>Config</a></li>
        </ul>
    </nav>

    <main class="container">
        {% block content %}{% endblock %}
    </main>

    <footer>
        Viral Clipper &mdash; Automated Short-Form Content Pipeline
    </footer>

    <script src="/app.js"></script>
</body>
</html>
